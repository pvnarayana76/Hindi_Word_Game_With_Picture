<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hindi Game 1: Visual & Spelling</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; height: 100vh; height: 100dvh; display: flex; align-items: center; justify-content: center; background-color: #f0f2f5; overflow: hidden; }
        #game-board { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 98vw; height: 96%; display: flex; flex-direction: column; padding: 1.5vh 1.5vw; position: relative; overflow: hidden; }
        .header-controls { display: flex; justify-content: center; gap: 8px; margin-bottom: 1.5vh; flex-wrap: wrap; }
        select, #new-student-btn { padding: 6px 10px; border-radius: 8px; font-size: clamp(12px, 2vmin, 15px); font-weight: bold; border: 1px solid #ccc; cursor: pointer; outline: none;}
        #new-student-btn { background: #d32f2f; color: white; border: none; }
        #voice-select { background: #e3f2fd; border-color: #2196f3; max-width: 200px; }
        
        /* Added min-height: 0 to all flex containers to prevent overlapping! */
        .main-responsive-area { display: flex; flex-direction: row; flex: 1; gap: 2vw; width: 100%; overflow: hidden; align-items: stretch; min-height: 0;}
        .left-half { flex: 0.45; display: flex; align-items: center; justify-content: center; background: #fcfcfc; border: 2px solid #eaeaea; border-radius: 15px; padding: 1.5vh; box-shadow: inset 0 0 20px rgba(0,0,0,0.02); overflow: hidden; min-height: 0;}
        #image-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        #word-image { width: auto; height: auto; max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 10px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
        #fallback-text { font-size: 6vmin; font-weight: bold; color: #444; display: none; }
        .right-half { flex: 0.55; display: flex; flex-direction: column; justify-content: space-between; padding: 0.5vh 0; overflow: hidden; min-height: 0;}
        .game-area { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 1.5vh; flex: 1; overflow: hidden; min-height: 0;}
        
        #answer-box, #scrambled-box { width: 100%; min-height: 10vh; background: #fafafa; border: 1px solid #eee; border-radius: 12px; display: flex; justify-content: center; align-items: center; gap: 10px; padding: 1.5vh; flex-wrap: wrap; }
        #answer-box { border: 2px dashed #bbb; }
        
        #mcq-box { width: 100%; display: none; flex-direction: column; gap: 2vh; align-items: center; justify-content: center; flex: 1;}
        .mcq-btn { background: #1976d2; color: white; font-size: clamp(20px, 5vh, 40px); font-weight: bold; padding: 2vh 4vw; width: 85%; border-radius: 12px; border: none; cursor: pointer; box-shadow: 0 5px 0 #0d47a1; transition: 0.1s;}
        .mcq-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #0d47a1; }
        .mcq-correct { background: #34a853 !important; box-shadow: 0 5px 0 #1b5e20 !important; }
        .mcq-wrong { background: #d32f2f !important; box-shadow: 0 5px 0 #b71c1c !important; }

        .letter-tile { background-color: #e91e63; color: white; font-size: clamp(18px, 5vh, 40px); padding: 1vh 2.5vw; border-radius: 10px; cursor: pointer; user-select: none; box-shadow: 0 5px 0 #ad1457; transition: 0.1s; }
        .letter-tile:active { transform: translateY(3px); box-shadow: 0 2px 0 #ad1457; }
        .tile-correct { background-color: #34a853 !important; box-shadow: 0 5px 0 #2d8a46 !important; }
        .glow-success { border: 3px solid #34a853 !important; background-color: #f0fff4 !important; transition: 0.2s;}
        .controls { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; min-height: 40px; }
        button { color: white; border: none; padding: 1.2vh 2vw; font-size: clamp(12px, 2.5vh, 16px); font-weight: bold; cursor: pointer; border-radius: 8px; }
        #back-btn { background: #607d8b; display: none; } #clear-btn { background: #f4b400; display: none; } #skip-btn { background: #9c27b0; display: none; } #pronounce-btn { background: #1a73e8; display: none; } #next-btn { background: #34a853; display: none; }
        #status-message { height: 25px; font-size: clamp(14px, 3vh, 22px); font-weight: bold; text-align: center; width: 100%; transition: 0.2s;}
        .stats-container { width: 100%; display: flex; flex-direction: column; align-items: center; border-top: 2px solid #eee; padding-top: 1vh; margin-top: auto;}
        .stats { width: 100%; display: flex; justify-content: space-around; align-items: center; font-size: clamp(12px, 2.5vh, 18px); font-weight: bold; gap: 5px; }
        #marks-display { color: #d32f2f; background: #ffebee; padding: 5px 12px; border-radius: 8px; }
        #timer-display { color: #1976d2; background: #e3f2fd; padding: 5px 12px; border-radius: 8px; }
        #voice-debug { font-size: 11px; color: #888; margin-top: 0.5vh; }
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid #e91e63; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; display: none; position: absolute; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Overlays */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.97); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; border-radius: 15px;}
        .overlay-title { font-size: clamp(24px, 6vmin, 40px); color: #2e7d32; font-weight: bold; text-align: center; padding: 10px;}
        .overlay-btn { font-size: clamp(16px, 3vmin, 20px); font-weight: bold; padding: 12px 20px; border-radius: 10px; cursor: pointer; border: none; color: white; transition: 0.1s; box-shadow: 0 4px 0 rgba(0,0,0,0.2);}
        .overlay-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.2);}
        .btn-yes { background: #34a853; } .btn-no { background: #d32f2f; } .btn-play { background: #1976d2; }

        /* PORTRAIT MODE FIX (Mobile vertical) */
        @media (orientation: portrait) { 
            .main-responsive-area { flex-direction: column; gap: 1vh; } 
            .left-half { flex: 0 0 35%; padding: 0.5vh; min-height: 0;} 
            .right-half { flex: 1; min-height: 0;}
            .game-area { gap: 1vh; }
            #mcq-box { gap: 1.5vh; }
            .mcq-btn { padding: 1.5vh 2vw; font-size: clamp(18px, 3.5vh, 28px); width: 95%; }
            .letter-tile { padding: 1vh 3vw; font-size: clamp(18px, 4vh, 30px); }
            #answer-box, #scrambled-box { min-height: 8vh; padding: 1vh;}
            .controls button { padding: 1vh 3vw; font-size: clamp(14px, 2.5vh, 18px); }
        }

        /* EXTREME SQUASH FOR LANDSCAPE MOBILE */
        @media (max-height: 500px) {
            .header-controls { margin-bottom: 0.5vh; gap: 4px; }
            select, #new-student-btn { padding: 3px 6px; font-size: 12px; }
            .game-area { gap: 1vh; }
            #mcq-box { gap: 1vh; }
            .mcq-btn { padding: 1vh 2vw; font-size: clamp(16px, 5vh, 24px); width: 95%; box-shadow: 0 3px 0 #0d47a1; }
            .controls button { padding: 1vh 2vw; font-size: clamp(12px, 4vh, 16px); }
            #status-message { height: 18px; font-size: clamp(12px, 4vh, 16px); margin: 0; }
            .stats-container { padding-top: 0.5vh; }
            .letter-tile { padding: 0.5vh 2vw; font-size: clamp(16px, 5vh, 24px); box-shadow: 0 3px 0 #ad1457;}
            #answer-box, #scrambled-box { min-height: 6vh; padding: 1vh; }
        }
    </style>
</head>
<body onclick="kickstartSpeech()">

<div id="game-board">
    <div class="header-controls">
        <select id="lesson-select" onchange="changeLesson()">
            <option value="1">Lesson 1 (बारिश)</option>
            <option value="2">Lesson 2 (तितली)</option>
            <option value="3">Lesson 3 (ऊँट चला)</option>
            <option value="4">Lesson 4 (मेरा देश महान है)</option>
            <option value="5">Lesson 5 (मेरी बहना)</option>
            <option value="6">Lesson 6 (खिलौनेवाला)</option>
            <option value="7">Lesson 7 (तरकारी दरबार)</option>
            <option value="8">Lesson 8 (दो मित्र)</option>
            <option value="9">Lesson 9 (जन्मदिन)</option>
            <option value="animals">पशु-पक्षी</option>
            <option value="veggies">साग-सब्ज़ी</option>
            <option value="flowers">फूल</option>
        </select>
        <select id="level-select" onchange="changeLesson()">
            <option value="1">Level 1 (MCQ)</option>
            <option value="2">Level 2 (Learn)</option>
            <option value="3">Level 3 (Challenge)</option>
        </select>
        <select id="voice-select" onchange="manualVoiceSet()"><option value="">Select Voice</option></select>
        <button id="new-student-btn" onclick="restartForNewStudent()">🔄 Reset</button>
    </div>
    
    <div id="l12-view" class="main-responsive-area">
        <div class="left-half">
            <div id="image-container">
                <div id="loading-spinner" class="spinner"></div>
                <img id="word-image" src="">
                <div id="fallback-text"></div>
            </div>
        </div>
        <div class="right-half">
            <div class="game-area">
                <div id="mcq-box"></div>
                <div id="answer-box"></div>
                <div id="scrambled-box"></div>
                <div id="status-message"></div>
                
                <div class="controls">
                    <button id="back-btn" onclick="prevWord()">⬅️ Back</button>
                    <button id="clear-btn" onclick="clearAnswer()">Clear</button>
                    <button id="skip-btn" onclick="skipWord()">Skip ⏭️</button>
                    <button id="pronounce-btn" onclick="pronounceWord()">🔊 Speak</button>
                    <button id="next-btn" onclick="nextWord()">Next ➡️</button>
                </div>
            </div>
        </div>
    </div>

    <div class="stats-container">
        <div class="stats">
            <div id="word-count">0 / 0</div>
            <div id="timer-display">⏱️ 00:00</div>
            <div id="marks-display">Marks: 0</div>
        </div>
        <div id="voice-debug">Click anywhere to wake audio.</div>
    </div>

    <div id="end-lesson-overlay" class="overlay">
        <div style="font-size: 60px;">🎉</div>
        <div id="end-lesson-text" class="overlay-title">शानदार! (Brilliant!)</div>
        <div id="end-lesson-subtext" style="margin-top: 15px; font-size: clamp(16px, 4vmin, 24px); color: #444; font-weight: bold; text-align: center;">What would you like to do next?</div>
        <div style="margin-top: 30px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;">
            <button id="btn-next-lesson" class="overlay-btn btn-yes" onclick="continueToNextLesson()">➡️ अगले पाठ (Next Lesson)</button>
            <button id="btn-next-level" class="overlay-btn btn-play" onclick="continueToNextLevel()">⬆️ अगले स्तर (Next Level)</button>
            <button class="overlay-btn btn-no" onclick="showFinalSummary()">🏆 समाप्त करें (Exit)</button>
        </div>
    </div>

    <div id="summary-overlay" class="overlay">
        <div style="font-size: 80px;">🏆</div>
        <div style="font-size: clamp(30px, 6vmin, 50px); color: #1976d2; font-weight: bold; margin: 20px 0;">Congratulations!</div>
        <div id="final-score-text" style="font-size: clamp(20px, 5vmin, 30px); font-weight: bold; color: #d32f2f; margin-bottom: 10px;">Total Marks: 0</div>
        <div id="final-time-text" style="font-size: clamp(20px, 5vmin, 30px); font-weight: bold; color: #1976d2; margin-bottom: 40px;">Total Time: 00:00</div>
        <button class="overlay-btn btn-play" onclick="closeSummaryAndReset()">Play Again</button>
    </div>
</div>

    function pauseTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
    function resetTimer() { pauseTimer(); timerSeconds = 0; document.getElementById("timer-display").innerText = "⏱️ 00:00"; }

        "veggies": { words: [{ img: "aaloo.jpg", hi: "आलू", en: "Potato" }, { img: "pyaj.jpg", hi: " प्याज", en: "Onion" }, { img: "mirch.jpg", hi: "मिर्च", en: "Chili" }, { img: "tamatar.jpg", hi: "टमाटर", en: "Tomato" }, { img: "turai.jpg", hi: "तुरई", en: "Ridge Gourd" }, { img: "baingan.jpg", hi: "बैंगन", en: "Brinjal" }, { img: "matar.jpg", hi: "मटर", en: "Peas" }, { img: "bhindi.jpg", hi: "भिंडी", en: "Okra" }, { img: "lauki.jpg", hi: "लौकी", en: "Bottle Gourd" }, { img: "adrak.jpg", hi: "अदरक", en: "Ginger" }, { img: "sem.jpg", hi: "सेम", en: "Beans" }, { img: "kakdi.jpg", hi: "ककड़ी", en: "Cucumber" }, { img: "karela.jpg", hi: "करेला", en: "Bitter Gourd" }, { img: "kundru.jpg", hi: "कुंदरू", en: "Ivy Gourd" }, { img: "chichinda.jpg", hi: "चिचिंडा", en: "Snake Gourd" }, { img: "shakarkand.jpg", hi: "शकरकंद", en: "Sweet Potato" }, { img: "phoolgobhi.jpg", hi: "फूल गोभी", en: "Cauliflower" }, { img: "bandgobhi.jpg", hi: "बंद गोभी", en: "Cabbage" }, { img: "sahjan.jpg", hi: "सहजन", en: "Drumstick" }, { img: "gajar.jpg", hi: "गाजर", en: "Carrot" }, { img: "palak.jpg", hi: "पालक", en: "Spinach" }, { img: "chaulai.jpg", hi: "चौलाई", en: "Amaranth" }, { img: "haridhaniya.jpg", hi: "हरी धनिया", en: "Coriander" }, { img: "meethaneem.jpg", hi: "मीठा नीम", en: "Curry Leaves" }, { img: "lahsun.jpg", hi: "लहसुन", en: "Garlic" }, { img: "kumhada.jpg", hi: "कुम्हड़ा", en: "Pumpkin" }, { img: "imli.jpg", hi: "इमली", en: "Tamarind" }, { img: "lobiya.jpg", hi: "लोबिया", en: "Black-eyed Peas"}, { img: "petha.jpg", hi: "पेठा", en: "Ash Gourd"}, { img: "parwal.jpg", hi: "परवल", en: "Pointed Gourd"}, { img: "kathal.jpg", hi: "कटहल", en: "Jackfruit"}, { img: "shaljam.jpg", hi: "शलजम", en: "Turnip"}, { img: "tinde.jpg", hi: "टिंडे", en: "Apple Gourd"}]},
        "flowers": { words: [{ img: "gulab.jpg", hi: "गुलाब", en: "Rose" }, { img: "kamal.jpg", hi: "कमल", en: "Lotus" }, { img: "kevda.jpg", hi: "केवड़ा", en: "Kewra" }, { img: "chameli.jpg", hi: "चमेली", en: "Jasmine" }, { img: "champa.jpg", hi: "चंपा", en: "Champa" }, { img: "juhi.jpg", hi: "जूही", en: "Juhi" }, { img: "gudhal.jpg", hi: "गुड़हल", en: "Hibiscus" }, { img: "genda.jpg", hi: "गेंदा", en: "Marigold" }, { img: "parijat.jpg", hi: "पारिजात", en: "Parijat" }, { img: "surajmukhi.jpg", hi: "सूरजमुखी", en: "Sunflower" }]}
    };

    var currentMarks = 0, solvedWordsGlobal = [], synth = window.speechSynthesis, manualVoice = null;
    var currentWordList = [], currentIndex = 0, currentHindiWord = "", availableLetters = [], selectedLetters = [];
    var isProcessing = false;

    function changeLesson() {
        var lesson = document.getElementById("lesson-select").value;
        currentWordList = shuffleArray(lessonsData[lesson].words.map(function(w) { var o = Object.assign({}, w); o.lessonOrigin = lesson; return o; }));
        currentIndex = 0; loadWord();
    }
    function restartForNewStudent() { currentMarks = 0; solvedWordsGlobal = []; document.getElementById("marks-display").innerText = "Marks: 0"; resetTimer(); changeLesson(); }

    function getMCQDecoys(correctWord, currentLessonKey) {
        var allWords = [];
        for (var i = 0; i < lessonOrder.length; i++) {
            var key = lessonOrder[i];
            var wList = lessonsData[key].words;
            for(var w=0; w<wList.length; w++) { allWords.push(wList[w].hi); }
            if (key === currentLessonKey) break;
        }
        var pool = shuffleArray(allWords.filter(function(w) { return w !== correctWord; }));
        return [pool[0] || "आम", pool[1] || "अनार"];
    }

    function loadWord() {
        isProcessing = false;
        if (currentIndex >= currentWordList.length) { triggerLessonComplete(); return; }
        var img = document.getElementById("word-image"), level = document.getElementById("level-select").value;
        document.getElementById("answer-box").innerHTML = ""; document.getElementById("scrambled-box").innerHTML = ""; document.getElementById("mcq-box").innerHTML = "";
        document.getElementById("answer-box").classList.remove("glow-success"); document.getElementById("status-message").innerText = "";
        document.getElementById("skip-btn").style.display = "none"; document.getElementById("clear-btn").style.display = "none"; document.getElementById("next-btn").style.display = "none";
        
        document.getElementById("loading-spinner").style.display = "block"; img.style.display = "none"; document.getElementById("fallback-text").style.display = "none";
        
        currentHindiWord = currentWordList[currentIndex].hi;
        document.getElementById("word-count").innerText = (currentIndex + 1) + " / " + currentWordList.length;
        
        img.src = currentWordList[currentIndex].img;
        img.onload = function() { document.getElementById("loading-spinner").style.display = "none"; img.style.display = "block"; setupLevel(level); };
        img.onerror = function() { document.getElementById("loading-spinner").style.display = "none"; document.getElementById("fallback-text").innerText = currentWordList[currentIndex].en; document.getElementById("fallback-text").style.display = "block"; setupLevel(level); };
    }

    function setupLevel(level) {
        document.getElementById("skip-btn").style.display = "inline-block";
        if (synth.getVoices().length > 0 || manualVoice) document.getElementById("pronounce-btn").style.display = "inline-block";
        document.getElementById("back-btn").style.display = (currentIndex > 0) ? "inline-block" : "none";
        
        if (level === "1") {
            document.getElementById("answer-box").style.display = "none"; document.getElementById("scrambled-box").style.display = "none";
            var mcqBox = document.getElementById("mcq-box"); mcqBox.style.display = "flex";
            var decoys = getMCQDecoys(currentHindiWord, document.getElementById("lesson-select").value);
            var options = shuffleArray([currentHindiWord, decoys[0], decoys[1]]);
            options.forEach(function(opt) {
                var btn = document.createElement("button"); btn.className = "mcq-btn"; btn.innerText = opt;
                btn.onclick = function() { checkMCQ(opt, btn); }; mcqBox.appendChild(btn);
            });
        } else {
            document.getElementById("answer-box").style.display = "flex"; document.getElementById("scrambled-box").style.display = "flex";
            document.getElementById("mcq-box").style.display = "none"; document.getElementById("clear-btn").style.display = "inline-block";
            var correctTiles = segmentHindi(currentHindiWord);
            availableLetters = correctTiles.slice();
            if (level === "3") { 
                var pool = [];
                for(var i=0; i<lessonOrder.length; i++) { var k = lessonOrder[i]; if(keyboardData[k]) pool = pool.concat(keyboardData[k].c).concat(keyboardData[k].v); if(k === currentWordList[currentIndex].lessonOrigin) break;}
                availableLetters.push(pool[Math.floor(Math.random()*pool.length)]);
            }
            availableLetters = shuffleArray(availableLetters); selectedLetters = []; updateUI();
        }
        startTimer();
    }

    function checkMCQ(guess, btn) {
        if (isProcessing) return;
        var buttons = document.querySelectorAll(".mcq-btn");
        for(var i=0; i<buttons.length; i++) buttons[i].disabled = true;
        
        if (guess === currentHindiWord) {
            isProcessing = true;
            btn.classList.add("mcq-correct"); clapSound.play().catch(function(){});
            var msgBox = document.getElementById("status-message");

            if (solvedWordsGlobal.indexOf(currentHindiWord) === -1) {
                currentMarks += 1; 
                solvedWordsGlobal.push(currentHindiWord); 
                document.getElementById("marks-display").innerText = "Marks: " + currentMarks; 
                msgBox.innerText = "🌟 बहुत बढ़िया! (Excellent!)";
                msgBox.style.color = "#2e7d32";
            } else {
                msgBox.innerText = "पहले ही खेल लिया! (Already played)";
                msgBox.style.color = "#ff9800";
            }
            document.getElementById("next-btn").style.display = "inline-block"; document.getElementById("skip-btn").style.display = "none";
        } else {
            btn.classList.add("mcq-wrong"); wrongSound.play().catch(function(){});
            currentMarks = Math.max(0, currentMarks - 1); document.getElementById("marks-display").innerText = "Marks: " + currentMarks;
            document.getElementById("status-message").innerText = "❌ Try again! (-1 Point)"; document.getElementById("status-message").style.color = "#d32f2f";
            setTimeout(function() { btn.classList.remove("mcq-wrong"); for(var i=0; i<buttons.length; i++) buttons[i].disabled = false; document.getElementById("status-message").innerText=""; }, 1000);
        }
    }

    function moveLetter(index, fromAvailable) {
        if (isProcessing) return;
        if (fromAvailable) { selectedLetters.push(availableLetters[index]); availableLetters.splice(index, 1); }
        else { availableLetters.push(selectedLetters[index]); selectedLetters.splice(index, 1); }
        updateUI();
        
        if (selectedLetters.join("") === currentHindiWord) {
            isProcessing = true;
            document.getElementById("answer-box").classList.add("glow-success");
            var tiles = document.querySelectorAll("#answer-box .letter-tile"); for(var i=0; i<tiles.length; i++) tiles[i].classList.add("tile-correct");
            document.getElementById("next-btn").style.display = "inline-block"; document.getElementById("skip-btn").style.display = "none"; document.getElementById("clear-btn").style.display = "none";
            var msgBox = document.getElementById("status-message");
            clapSound.play().catch(function(){});

            if (solvedWordsGlobal.indexOf(currentHindiWord) === -1) {
                currentMarks += parseInt(document.getElementById("level-select").value);
                solvedWordsGlobal.push(currentHindiWord); document.getElementById("marks-display").innerText = "Marks: " + currentMarks; 
                msgBox.innerText = "🌟 बहुत बढ़िया! (Excellent!)";
                msgBox.style.color = "#2e7d32";
            } else {
                msgBox.innerText = "पहले ही बना लिया! (Already built)";
                msgBox.style.color = "#ff9800";
            }
        } else if (selectedLetters.length === segmentHindi(currentHindiWord).length) {
            currentMarks = Math.max(0, currentMarks - 1); document.getElementById("marks-display").innerText = "Marks: " + currentMarks;
            document.getElementById("status-message").innerText = "❌ Try again! (-1 Point)"; document.getElementById("status-message").style.color = "#d32f2f"; wrongSound.play().catch(function(){});
        } else { document.getElementById("status-message").innerText = ""; }
    }

    function updateUI() {
        var sBox = document.getElementById("scrambled-box"), aBox = document.getElementById("answer-box"); sBox.innerHTML = ""; aBox.innerHTML = "";
        availableLetters.forEach(function(l, i) { var d = document.createElement("div"); d.className = "letter-tile"; d.innerText = l; d.onclick = function() { moveLetter(i, true); }; sBox.appendChild(d); });
        selectedLetters.forEach(function(l, i) { var d = document.createElement("div"); d.className = "letter-tile"; d.innerText = l; d.onclick = function() { moveLetter(i, false); }; aBox.appendChild(d); });
    }

    function triggerLessonComplete() {
        pauseTimer(); clapSound.play().catch(function(){});
        var currentLessonIdx = lessonOrder.indexOf(document.getElementById("lesson-select").value);
        var levelVal = parseInt(document.getElementById("level-select").value);
        
        document.getElementById("btn-next-lesson").style.display = (currentLessonIdx < lessonOrder.length - 1) ? "inline-block" : "none";
        document.getElementById("btn-next-level").style.display = (levelVal < 3) ? "inline-block" : "none";
        
        document.getElementById("end-lesson-overlay").style.display = "flex";
    }
    
    function continueToNextLesson() {
        document.getElementById("end-lesson-overlay").style.display = "none";
        var currentLessonIdx = lessonOrder.indexOf(document.getElementById("lesson-select").value);
        document.getElementById("lesson-select").value = lessonOrder[currentLessonIdx + 1];
        document.getElementById("level-select").value = "1";
        changeLesson();
    }

    function continueToNextLevel() {
        document.getElementById("end-lesson-overlay").style.display = "none";
        var levelVal = parseInt(document.getElementById("level-select").value);
        document.getElementById("level-select").value = (levelVal + 1).toString();
        changeLesson();
    }

    function showFinalSummary() { document.getElementById("end-lesson-overlay").style.display = "none"; document.getElementById("summary-overlay").style.display = "flex"; document.getElementById("final-score-text").innerText = "Total Marks: " + currentMarks; var h = Math.floor(timerSeconds/3600), m = Math.floor((timerSeconds%3600)/60), s = timerSeconds%60; document.getElementById("final-time-text").innerText = "Total Time: " + (h>0?(h<10?"0"+h:h)+":":"")+(m<10?"0"+m:m)+":"+(s<10?"0"+s:s); }
    function closeSummaryAndReset() { document.getElementById("summary-overlay").style.display = "none"; restartForNewStudent(); }
    function skipWord() { if (currentIndex < currentWordList.length - 1) { currentIndex++; loadWord(); } else { triggerLessonComplete(); } }
    function nextWord() { if (currentIndex < currentWordList.length - 1) { currentIndex++; loadWord(); } else { triggerLessonComplete(); } }
    function prevWord() { if (currentIndex > 0) { currentIndex--; loadWord(); } }
    function clearAnswer() { if(isProcessing) return; availableLetters = availableLetters.concat(selectedLetters); selectedLetters = []; updateUI(); }
    
    function kickstartSpeech() { synth.speak(new SpeechSynthesisUtterance(" ")); }
    function loadVoices() { var voices = synth.getVoices(), vSelect = document.getElementById("voice-select"), hiFound = false; for(var j=0; j<voices.length; j++) { if(voices[j].lang.indexOf('hi') !== -1) hiFound=true; } if (vSelect.options.length <= 1) { voices.forEach(function(v, i) { if (v.lang.indexOf('hi') !== -1) { var opt = document.createElement("option"); opt.value = i; opt.innerText = "Hindi - " + v.name; vSelect.appendChild(opt); } }); } if (hiFound || manualVoice) { document.getElementById("pronounce-btn").style.display = "inline-block"; document.getElementById("voice-debug").innerText = "Hindi voice ready! ✔️"; if (vSelect.options.length > 1 && vSelect.value === "") { vSelect.selectedIndex = 1; manualVoiceSet(); } } }
    function manualVoiceSet() { var idx = document.getElementById("voice-select").value; if (idx !== "") manualVoice = synth.getVoices()[idx]; }
    synth.onvoiceschanged = loadVoices;
    function pronounceWord() { synth.cancel(); var u = new SpeechSynthesisUtterance(currentHindiWord); if (manualVoice) u.voice = manualVoice; else u.lang = 'hi-IN'; u.rate = 0.8; synth.speak(u); }
    window.onload = function() { resetTimer(); changeLesson(); setTimeout(loadVoices, 1000); };
</script>
